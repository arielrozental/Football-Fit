<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Fit | חולצות כדורגל נדירות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000000; --green: #2ecc71; --blue: #3498db; --gray: #1a1a1a; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 0; }
        header { background: rgba(0,0,0,0.9); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--green); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; color: var(--green); }
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .product-card { background: var(--gray); border-radius: 15px; overflow: hidden; transition: transform 0.3s; padding-bottom: 20px; }
        .product-image { width: 100%; height: auto; object-fit: contain; }
        .product-info { padding: 20px; text-align: center; }
        .price { font-size: 1.5rem; color: var(--green); font-weight: bold; }
        .btn { background: var(--green); color: black; padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; width: 80%; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; }
        footer { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
<header><div class="logo">FOOTBALL FIT</div></header>
<section class="hero"><h1>המהדורות המיוחדות נחתו</h1><p>חולצות כדורגל שהן אמנות.</p></section>
<div class="container">
    <div class="grid">
        <div class="product-card">
            <img src="https://i.ibb.co/Xz9y0mY/japan-shirt.webp" class="product-image">
            <div class="product-info"><h3>Japan Samurai Edition</h3><p class="price">₪199.00</p><button class="btn">הזמן עכשיו</button></div>
        </div>
        <div class="product-card">
            <img src="https://i.ibb.co/PrtvYpG/brazil-shirt.webp" class="product-image">
            <div class="product-info"><h3>Brazil Legacy Edition</h3><p class="price">₪199.00</p><button class="btn">הזמן עכשיו</button></div>
        </div>
    </div>
</div>
<a href="https://wa.me/972500000000" class="whatsapp-float">דברו איתנו בוואטסאפ 💬</a>
<footer><p>© 2024 Football Fit</p></footer>
</body>
</html>
