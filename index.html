<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Fit | חולצות כדורגל ב-70₪</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000000; --green: #2ecc71; --gray: #1a1a1a; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 0; }
        header { background: rgba(0,0,0,0.9); padding: 15px; text-align: center; border-bottom: 2px solid var(--green); }
        .logo { font-size: 24px; font-weight: 800; color: var(--green); }
        .hero { text-align: center; padding: 30px 20px; background: #111; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .product-card { background: var(--gray); border-radius: 12px; overflow: hidden; text-align: center; border: 1px solid #333; }
        .product-image { width: 100%; height: auto; }
        .product-info { padding: 15px; }
        .price { font-size: 2.2rem; color: var(--green); font-weight: bold; margin: 10px 0; }
        .btn { background: var(--green); color: black; padding: 15px; border-radius: 50px; font-weight: bold; text-decoration: none; display: block; font-size: 1.1rem; }
    </style>
</head>
<body>
<header><div class="logo">FOOTBALL FIT</div></header>
<section class="hero"><h1>מבצע פתיחה: חולצות ב-70₪</h1></section>
<div class="container">
    <div class="grid">
        <div class="product-card">
            <img src="https://i.ibb.co/Xz9y0mY/japan-shirt.webp" class="product-image">
            <div class="product-info"><h3>Japan Samurai Edition</h3><p class="price">₪70</p>
            <a href="https://wa.me/972500000000" class="btn">הזמן עכשיו בוואטסאפ</a></div>
        </div>
        <div class="product-card">
            <img src="https://i.ibb.co/PrtvYpG/brazil-shirt.webp" class="product-image">
            <div class="product-info"><h3>Brazil Legacy Edition</h3><p class="price">₪70</p>
            <a href="https://wa.me/972500000000" class="btn">הזמן עכשיו בוואטסאפ</a></div>
        </div>
    </div>
</div>
</body>
</html>
