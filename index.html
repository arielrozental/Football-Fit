<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Fit | Official Store</title>
    <!-- אייקונים -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #000000;
            --bg-color: #ffffff;
            --gray-light: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--main-color);
            overflow-x: hidden;
        }

        /* ניווט */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: white;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo h1 {
            font-size: 22px;
            letter-spacing: 4px;
            margin: 0;
            font-weight: 900;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            font-size: 18px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        #cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: black;
            color: white;
            font-size: 10px;
            width: 16px;
            height: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        /* באנר ראשי */
        .hero {
            width: 100%;
        }

        .hero img {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
        }

        /* גריד מוצרים */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            background-color: #fff;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .product-info h3 {
            font-size: 15px;
            margin: 5px 0;
            height: 40px;
        }

        .price {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .add-to-cart {
            width: 100%;
            background: black;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        /* וואטסאפ צף */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .logo h1 { font-size: 18px; }
            .product-grid { gap: 10px; padding: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-icons"><i class="fa-solid fa-magnifying-glass"></i></div>
        <div class="logo"><h1>FOOTBALL FIT</h1></div>
        <div class="nav-icons">
            <div class="cart-icon">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1543351611-58f69d7c1781?q=80&w=1000&auto=format&fit=crop" alt="Football Banner">
    </section>

    <section class="product-grid">
        
        <!-- מוצר 1 - יפן (הקישור הראשון ששלחת) -->
        <div class="product-card">
            <img src="https://i.ibb.co/WRHTwBH/1-F1-A1530-8037-4-B6-F-9425-539031-A84-CCD.png" alt="חולצת יפן">
            <div class="product-info">
                <h3>חולצת יפן Special Edition</h3>
                <span class="price">₪70.00</span>
                <select id="size-japan">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
                <button class="add-to-cart" onclick="addToCart('יפן ספיישל', 70, 'size-japan')">הוספה לסל</button>
            </div>
        </div>

        <!-- מוצר 2 - ברזיל (הקישור השני ששלחת) -->
        <div class="product-card">
            <img src="https://i.ibb.co/4rYMPbd/D58-E4645-36-A1-4650-B55-B-CB3-A511-B5-B48.png" alt="חולצת ברזיל">
            <div class="product-info">
                <h3>חולצת ברזיל רטרו</h3>
                <span class="price">₪70.00</span>
                <select id="size-brazil">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                </select>
                <button class="add-to-cart" onclick="addToCart('ברזיל רטרו', 70, 'size-brazil')">הוספה לסל</button>
            </div>
        </div>

    </section>

    <a href="https://wa.me/972508353336" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        let cartCount = 0;
        const phoneNumber = "972508353336"; 

        function addToCart(name, price, sizeId) {
            const size = document.getElementById(sizeId).value;
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;

            const message = `היי Football Fit, אני רוצה להזמין:
⚽ מוצר: ${name}
📏 מידה: ${size}
💰 מחיר: ₪${price}`;
            
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

            if(confirm(`הוספת לסל: ${name} במידה ${size}.\nלעבור לוואטסאפ להשלמת הזמנה?`)) {
                window.open(whatsappUrl, '_blank');
            }
        }
    </script>
</body>
</html>
