<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Fit | חולצות ב-70 ש"ח</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --black: #0b0b0b; --green: #2ecc71; --gray: #1a1a1a; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 0; }
        header { background: rgba(0,0,0,0.9); padding: 15px; text-align: center; border-bottom: 2px solid var(--green); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; color: var(--green); }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .section-title { border-right: 5px solid var(--green); padding-right: 10px; margin: 25px 0; font-size: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--gray); border-radius: 12px; overflow: hidden; border: 1px solid #333; text-align: center; padding-bottom: 15px; }
        .product-image { width: 100%; height: 350px; object-fit: cover; background: #222; }
        .product-info { padding: 15px; }
        .price { font-size: 1.8rem; color: var(--green); font-weight: bold; margin: 10px 0; }
        .size-selector { width: 90%; padding: 10px; margin-bottom: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        .btn { background: var(--green); color: black; padding: 12px; border: none; border-radius: 50px; font-weight: bold; width: 90%; cursor: pointer; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
